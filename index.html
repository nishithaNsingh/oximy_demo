<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tool Risk Profiler</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Dark background like Oximy */
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ff6b35;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ffffff, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 18px;
            color: #a0a0a0;
            margin-bottom: 10px;
        }

        /* Main container */
        .container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        /* Input section */
        .input-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 107, 53, 0.3);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 107, 53, 0.2);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #ff6b35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        input::placeholder {
            color: #707070;
        }

        /* Button */
        button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #ff6b35, #ff8555);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Loading state */
        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Results section */
        .results {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 107, 53, 0.3);
            border-radius: 12px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .results.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 107, 53, 0.2);
        }

        .domain-name {
            font-size: 24px;
            font-weight: 600;
            color: white;
        }

        /* Trust score display */
        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            position: relative;
            flex-shrink: 0;
        }

        .score-circle.high {
            background: rgba(76, 175, 80, 0.2);
            border: 2px solid #4caf50;
            color: #4caf50;
        }

        .score-circle.medium {
            background: rgba(255, 193, 7, 0.2);
            border: 2px solid #ffc107;
            color: #ffc107;
        }

        .score-circle.low {
            background: rgba(244, 67, 54, 0.2);
            border: 2px solid #f44336;
            color: #f44336;
        }

        .score-number {
            font-size: 48px;
            line-height: 1;
        }

        .score-label {
            font-size: 12px;
            margin-top: 8px;
        }

        /* Risk details */
        .risk-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .detail-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #ff6b35;
        }

        .detail-label {
            font-size: 12px;
            color: #a0a0a0;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 8px;
            margin-bottom: 4px;
        }

        .badge.true {
            background: rgba(76, 175, 80, 0.3);
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .badge.false {
            background: rgba(244, 67, 54, 0.3);
            color: #f44336;
            border: 1px solid #f44336;
        }

        .badge.unknown {
            background: rgba(255, 193, 7, 0.3);
            color: #ffc107;
            border: 1px solid #ffc107;
        }

        /* Error message */
        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            border-radius: 8px;
            padding: 15px;
            color: #ff7a66;
            margin-bottom: 20px;
        }

        /* Processing time */
        .processing-time {
            text-align: center;
            color: #707070;
            font-size: 12px;
            margin-top: 20px;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #707070;
            font-size: 12px;
        }

        .footer a {
            color: #ff6b35;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 {
                font-size: 32px;
            }

            .input-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .results-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .score-circle {
                width: 100px;
                height: 100px;
            }

            .risk-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">⚙️ OXIMY</div>
        <h1>AI Tool Risk Profiler</h1>
        <p class="subtitle">Automated security scoring for AI tools</p>
    </div>

    <div class="container">
        <!-- Input Section -->
        <div class="input-section">
            <div class="input-group">
                <!-- Change this URL to your deployed Render backend -->
                <!-- Example: https://your-app-name.onrender.com -->
                <input 
                    type="text" 
                    id="domainInput" 
                    placeholder="Enter domain (e.g., slack.com)" 
                    value="slack.com"
                >
                <button onclick="analyzeDomain()" id="analyzeBtn">
                    Analyze
                </button>
            </div>
        </div>

        <!-- Error message -->
        <div id="errorMessage" class="error" style="display: none;"></div>

        <!-- Results Section -->
        <div class="results" id="results">
            <div class="results-header">
                <div>
                    <div class="domain-name" id="resultDomain"></div>
                    <div class="processing-time" id="processingTime"></div>
                </div>
                <div class="score-circle" id="scoreCircle">
                    <div class="score-number" id="scoreNumber"></div>
                    <div class="score-label">Trust Score</div>
                </div>
            </div>

            <div class="risk-details" id="riskDetails"></div>
        </div>
    </div>

    <!-- <div class="footer">
        <p>Made for Oximy's FDE hiring 🚀</p>
    </div> -->

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        // IMPORTANT: Change this to your deployed Render backend URL
        // Example: const BACKEND_URL = "https://your-app-name.onrender.com";
        const BACKEND_URL = "http://localhost:8000";  // For local testing
        
        const API_KEY = "biM_FsNRuhunwfjNfUiYabwKUE8bde62vvHqldM1gfw";  // Change to match your API_KEY_SECRET in .env

        // ============================================
        // ANALYZE DOMAIN FUNCTION
        // ============================================
        // Called when user clicks "Analyze" button
        async function analyzeDomain() {
            const domain = document.getElementById("domainInput").value.trim();
            const button = document.getElementById("analyzeBtn");
            const errorDiv = document.getElementById("errorMessage");
            const resultsDiv = document.getElementById("results");

            // Hide previous results and errors
            resultsDiv.classList.remove("show");
            errorDiv.style.display = "none";

            // Validate input
            if (!domain) {
                showError("Please enter a domain");
                return;
            }

            // Show loading state
            button.disabled = true;
            button.innerHTML = '<div class="loading"><div class="spinner"></div>Analyzing...</div>';

            try {
                // Call the backend API
                // Flow: Send domain → Backend scrapes website → Claude extracts fields → Returns results
                const response = await fetch(`${BACKEND_URL}/analyze`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-API-Key": API_KEY
                    },
                    body: JSON.stringify({ domain: domain })
                });

                const data = await response.json();

                if (data.success) {
                    // ============================================
                    // DISPLAY RESULTS
                    // ============================================
                    displayResults(data);
                } else {
                    showError(data.error || "Failed to analyze domain");
                }
            } catch (error) {
                showError(`Error: ${error.message}`);
            } finally {
                // Reset button
                button.disabled = false;
                button.innerHTML = "Analyze";
            }
        }

        // ============================================
        // DISPLAY RESULTS FUNCTION
        // ============================================
        // Called when we get successful response from backend
        function displayResults(data) {
            // Update domain name
            document.getElementById("resultDomain").textContent = data.domain;

            // Update trust score circle
            const scoreCircle = document.getElementById("scoreCircle");
            const score = data.trust_score;
            
            // Clear previous classes
            scoreCircle.classList.remove("high", "medium", "low");

            // Add color based on score
            if (score >= 75) {
                scoreCircle.classList.add("high");
            } else if (score >= 50) {
                scoreCircle.classList.add("medium");
            } else {
                scoreCircle.classList.add("low");
            }

            document.getElementById("scoreNumber").textContent = score;
            document.getElementById("processingTime").textContent = `Analyzed in ${data.processing_time_ms}ms`;

            // Build risk details HTML
            // Each field shows what we extracted from the website
            const details = [
                { label: "Data Retention", value: data.data_retention || "Unknown" },
                { label: "Trains on Input", value: badgeValue(data.trains_on_input) },
                { label: "SOC2 Certified", value: badgeValue(data.soc2_certified) },
                { label: "HIPAA Compliant", value: badgeValue(data.hipaa_compliant) },
                { label: "GDPR Compliant", value: badgeValue(data.gdpr_compliant) },
                { label: "ISO 27001", value: badgeValue(data.iso_27001) },
                { label: "Breach Mentions", value: badgeValue(data.breach_mentions) }
            ];

            let detailsHTML = "";
            details.forEach(detail => {
                detailsHTML += `
                    <div class="detail-item">
                        <div class="detail-label">${detail.label}</div>
                        <div class="detail-value">${detail.value}</div>
                    </div>
                `;
            });

            document.getElementById("riskDetails").innerHTML = detailsHTML;

            // Show results
            document.getElementById("results").classList.add("show");
        }

        // ============================================
        // BADGE VALUE FUNCTION
        // ============================================
        // Converts boolean to colored badge
        function badgeValue(value) {
            if (value === true) {
                return '<span class="badge true">✓ Yes</span>';
            } else if (value === false) {
                return '<span class="badge false">✗ No</span>';
            } else {
                return '<span class="badge unknown">? Unknown</span>';
            }
        }

        // ============================================
        // SHOW ERROR FUNCTION
        // ============================================
        // Called when something goes wrong
        function showError(message) {
            document.getElementById("errorMessage").textContent = message;
            document.getElementById("errorMessage").style.display = "block";
        }

        // ============================================
        // ENTER KEY SUPPORT
        // ============================================
        // User can press Enter to analyze
        document.getElementById("domainInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                analyzeDomain();
            }
        });
    </script>
</body>
</html>
